<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#071416" />
<title data-i18n="appTitle">Shift-Flow</title>

  <style>
    :root{
      --bg: #071416;
      --card: #0d1d20;
      --text: #f4fbfb;
      --muted: #9ec3c3;
      --line: rgba(79, 214, 194, 0.16);
      --glow: rgba(79, 214, 194, 0.18);
    }

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body{
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height: 100vh;
    }

    .app{
      min-height: 100vh;
      padding:
        calc(20px + env(safe-area-inset-top))
        16px
        calc(20px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at top center, rgba(64, 220, 196, 0.08), transparent 34%),
        linear-gradient(180deg, #081618 0%, #071416 100%);
    }

    .topbar{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 5px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 24px var(--glow);
    }
    .topbar-plain{
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 0;
      justify-content: center;
}

    .logo-badge{
      width: 100px;
      height: 100px;
      object-fit: contain;
      flex: 0 0 72px;
      display: block;
    }

    .logo-wordmark{
      height: 100px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin-left: -20px;
    }

    .screen-card{
      width: 100%;
      min-height: 50px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      box-shadow: 0 0 24px var(--glow);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder{
      text-align: center;
    }

    .placeholder h1{
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }

    .placeholder p{
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .home-search{
  width: 100%;
  height: 56px;
  border: 1px solid rgba(79, 214, 194, 0.22);
  border-radius: 18px;
  background: rgba(79, 214, 194, 0.08);
  color: #eafffb;
  padding: 0 18px;
  font-size: 16px;
  outline: none;
  box-shadow: 0 0 18px rgba(79, 214, 194, 0.10);
}

.home-search::placeholder{
  color: #9fd6cc;
}
.add-customer-btn{
  width: 100%;
  height: 40px;
  margin-top: 0px;
  border: 1px solid rgba(255, 90, 90, 0.26);
  border-radius: 18px;
  background: rgba(255, 90, 90, 0.08);
  color: #ffe8e8;
  padding: 0 18px;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  box-shadow: 0 0 18px rgba(255, 90, 90, 0.10);
}
.add-customer-card{
  margin-top: 12px;
}
.search-wrap{
  position: relative;
  width: 100%;
}

.search-icon{
  position: absolute;
  left: 10px;
  top: 40%;
  transform: translateY(-50%);
  color: #9fd6cc;
  font-size: 50px;
  line-height: 1;
  pointer-events: none;
}

.search-wrap .home-search{
  padding-left: 44px;
}
.live-search-layer{
  position: absolute;
  top: calc(100% + 10px);
  left: 0;
  right: 0;
  z-index: 30;
  min-height: 0;
  max-height: 55vh;
  overflow-y: auto;
  border: 1px solid rgba(79, 214, 194, 0.22);
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(10, 31, 34, 0.98), rgba(8, 24, 27, 0.98));
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34), 0 0 24px rgba(79, 214, 194, 0.12);
  backdrop-filter: blur(8px);
}
.settings-fab{
  position: fixed;
  right: 16px;
  bottom: calc(16px + env(safe-area-inset-bottom));
  width: 40px;
  height: 40px;
  border: 1px solid rgba(79, 214, 194, 0.22);
  border-radius: 14px;
  background: linear-gradient(180deg, rgba(15, 39, 42, 0.96), rgba(9, 27, 30, 0.96));
  color: #dffcf8;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.30), 0 0 18px rgba(79, 214, 194, 0.12);
  z-index: 40;
  line-height: 1;
  padding: 0;
}

.settings-fab:active{
  transform: scale(0.97);
}
#settingsPanelHost{
  position: fixed;
  inset: 0;
  z-index: 60;
}

#settingsPanelHost[hidden]{
  display: none;
}

.settings-panel-placeholder{
  position: absolute;
  inset: 0;
  background: rgba(2, 10, 12, 0.58);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 14px;
}

.settings-panel-card{
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid rgba(79, 214, 194, 0.22);
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(20, 60, 64, 0.98), rgba(11, 34, 37, 0.98));
  color: #f4fbfb;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34), 0 0 24px rgba(79, 214, 194, 0.12);
  padding: 16px;
}

.settings-panel-top{
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}

.settings-close-btn{
  width: 40px;
  height: 40px;
  border: 1px solid rgba(79, 214, 194, 0.22);
  border-radius: 14px;
  background: rgba(79, 214, 194, 0.08);
  color: #eafffb;
  font-size: 20px;
}

.settings-block{
  margin-top: 16px;
}

.settings-block h3{
  margin-bottom: 10px;
  font-size: 18px;
}

.language-list{

  flex-wrap: wrap;
  gap: 8px;

  padding: 0 12px;
  border: 1px solid rgba(79, 214, 194, 0.22);
  border-radius: 14px;
  background: rgba(79, 214, 194, 0.08);
  color: #eafffb;
  font-size: 14px;
}
#customerInputHost{

  inset: 0;
  z-index: 70;
}

#customerInputHost[hidden]{
  display: none;
}
#customerOverlayHost{

  inset: 0;
  z-index: 75;
}

#customerOverlayHost[hidden]{

}

function normalizePhoneNumber(rawValue = '', defaultCountryCode = '') {
  const input = String(rawValue || '').trim();

  if (!input) return '';

  let cleaned = input.replace(/[^\d+]/g, '');

  if (cleaned.startsWith('00')) {
    cleaned = `+${cleaned.slice(2)}`;
  }

  if (cleaned.startsWith('+')) {
    return `+${cleaned.slice(1).replace(/\D/g, '')}`;
  }

  cleaned = cleaned.replace(/\D/g, '');

  if (!cleaned) return '';

  if (cleaned.startsWith('0') && defaultCountryCode) {
    return `${defaultCountryCode}${cleaned.slice(1)}`;
  }

  return cleaned;
}

function normalizeWebsiteUrl(rawValue = '') {
  const input = String(rawValue || '').trim();

  if (!input) return '';

  if (/^https?:\/\//i.test(input)) {
    return input;
  }

  return `https://${input}`;
}

function normalizeAddressValue(rawValue = '') {
  return String(rawValue || '').trim();
}

  async function loadSettingsPanel() {
    if (!settingsPanelHost) return;

    try {
      const response = await fetch('settings-panel.html');
      const html = await response.text();
      settingsPanelHost.innerHTML = html;
      const closeSettingsBtn = settingsPanelHost.querySelector('#closeSettingsBtn');

if (closeSettingsBtn) {
  closeSettingsBtn.addEventListener('click', () => {
    settingsPanelHost.hidden = true;
  });
}
const languageSelect = settingsPanelHost.querySelector('#languageSelect');
const defaultCountryCodeSelect = settingsPanelHost.querySelector('#defaultCountryCodeSelect');

if (defaultCountryCodeSelect) {
  SHIFT_FLOW_COUNTRY_CODES.forEach(country => {
    const option = document.createElement('option');
    option.value = country.code;
    option.textContent = country.label;
    defaultCountryCodeSelect.appendChild(option);
  });

  defaultCountryCodeSelect.value = SHIFT_FLOW_RUNTIME.defaultCountryCode || '';

  defaultCountryCodeSelect.addEventListener('change', (event) => {
    const nextCode = event.target.value || '';
    SHIFT_FLOW_RUNTIME.defaultCountryCode = nextCode;
  });
}

if (languageSelect) {
  languageSelect.value = document.documentElement.dataset.lang || 'nl';

  languageSelect.addEventListener('change', (event) => {
    const nextLang = event.target.value;

    if (window.applyShiftFlowTranslations) {
      window.applyShiftFlowTranslations(nextLang);
    }
  });
}
  } catch (error) {
      console.error('Settings panel kon niet geladen worden.', error);
    }
  }

  async function loadCustomerInputPanel() {
  if (!customerInputHost) return;

   try {
    const response = await fetch('customer-input-flow.html');
    const html = await response.text();
    customerInputHost.innerHTML = html;

    if (window.applyShiftFlowTranslations) {
      const activeLang = document.documentElement.dataset.lang || 'nl';
      window.applyShiftFlowTranslations(activeLang);
    }

    const mainPhotoInput = customerInputHost.querySelector('#customerMainPhotoInput');
    const mainPhotoPreviewImg = customerInputHost.querySelector('#customerMainPhotoPreviewImg');
    const mainPhotoPlaceholderText = customerInputHost.querySelector('#customerMainPhotoPlaceholderText');

  if (mainPhotoInput && mainPhotoPreviewImg && mainPhotoPlaceholderText) {
  mainPhotoInput.addEventListener('change', () => {
    const file = mainPhotoInput.files && mainPhotoInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {
      mainPhotoPreviewImg.src = reader.result;
      mainPhotoPreviewImg.style.display = 'block';
      mainPhotoPlaceholderText.style.display = 'none';
    };

    reader.readAsDataURL(file);
  });

  mainPhotoPreviewImg.addEventListener('click', () => {
    mainPhotoInput.value = '';

<script>
  function applyTranslations(lang) {
    const dict = (window.SHIFTFLOW_TRANSLATIONS && window.SHIFTFLOW_TRANSLATIONS[lang])
      || (window.SHIFTFLOW_TRANSLATIONS && window.SHIFTFLOW_TRANSLATIONS.nl)
      || null;

    if (!dict) return;

    document.documentElement.lang = lang;
    document.documentElement.dataset.lang = lang;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (dict[key]) el.textContent = dict[key];
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (dict[key]) el.placeholder = dict[key];
    });
  }

  window.applyShiftFlowTranslations = applyTranslations;
</script>
