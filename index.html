  <style>
    :root{
      --bg: #071416;
      --card: #0d1d20;
      --text: #f4fbfb;
      --muted: #9ec3c3;
      --line: rgba(79, 214, 194, 0.16);
      --glow: rgba(79, 214, 194, 0.18);
    }

    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body{
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height: 100vh;
    }

    .app{
      min-height: 100vh;
      padding:
        calc(20px + env(safe-area-inset-top))
        16px
        calc(20px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at top center, rgba(64, 220, 196, 0.08), transparent 34%),
        linear-gradient(180deg, #081618 0%, #071416 100%);
    }

    .topbar{
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 5px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 24px var(--glow);
    }
    .topbar-plain{
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 0;
      justify-content: center;
}

    .logo-badge{
      width: 100px;
      height: 100px;
      object-fit: contain;
      flex: 0 0 72px;
      display: block;
    }

    .logo-wordmark{
      height: 100px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      margin-left: -20px;
    }

    .screen-card{
      width: 100%;
      min-height: 50px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      box-shadow: 0 0 24px var(--glow);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder{
      text-align: center;
    }

    .placeholder h1{
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }

    .placeholder p{
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

<div id="settingsPanelHost" hidden></div>
<div id="customerInputHost" hidden></div>

<div id="customerOverlayHost" hidden></div>
<div id="onboardingHost" hidden></div>

<div id="confirmModalHost" hidden>

</div>

function normalizePhoneNumber(rawValue = '', defaultCountryCode = '') {
  const input = String(rawValue || '').trim();

  if (!input) return '';

  let cleaned = input.replace(/[^\d+]/g, '');

  if (cleaned.startsWith('00')) {
    cleaned = `+${cleaned.slice(2)}`;
  }

  if (cleaned.startsWith('+')) {
    return `+${cleaned.slice(1).replace(/\D/g, '')}`;
  }

  cleaned = cleaned.replace(/\D/g, '');

  if (!cleaned) return '';

  if (cleaned.startsWith('0') && defaultCountryCode) {
    return `${defaultCountryCode}${cleaned.slice(1)}`;
  }

  return cleaned;
}

function normalizeWebsiteUrl(rawValue = '') {
  const input = String(rawValue || '').trim();

  if (!input) return '';

  if (/^https?:\/\//i.test(input)) {
    return input;
  }

  return `https://${input}`;
}

async function loadOnboardingFlow() {
  if (!onboardingHost) return;

  try {
    const response = await fetch('onboarding-flow.html');
    const html = await response.text();
    onboardingHost.innerHTML = html;
    onboardingHost.hidden = false;

 const onboardingLanguageButtons = onboardingHost.querySelectorAll('.onboarding-language-btn');
const onboardingSteps = Array.from(onboardingHost.querySelectorAll('.onboarding-step'));
const onboardingNextBtn = onboardingHost.querySelector('#onboardingNextBtn');
const onboardingBackBtn = onboardingHost.querySelector('#onboardingBackBtn');
let currentOnboardingLang = document.documentElement.dataset.lang || 'nl';

function applyOnboardingTranslations(lang) {
  const dict =
    window.SHIFTFLOW_TRANSLATIONS?.[lang] ||
    window.SHIFTFLOW_TRANSLATIONS?.nl ||
    null;

  if (!dict) return;

  currentOnboardingLang = lang;

  onboardingHost.querySelectorAll('[data-i18n]').forEach(element => {
    const key = element.dataset.i18n;
    if (!key || !dict[key]) return;
    element.textContent = dict[key];
  });

  if (window.applyShiftFlowTranslations) {
    window.applyShiftFlowTranslations(lang);
  }

  const languageSelect = settingsPanelHost?.querySelector('#languageSelect');
  if (languageSelect) {
    languageSelect.value = lang;
  }
}

    function getActiveStepIndex() {
      return onboardingSteps.findIndex(step => step.classList.contains('is-active'));
    }

    function showStep(nextIndex) {
      onboardingSteps.forEach((step, index) => {
        step.classList.toggle('is-active', index === nextIndex);
      });

      const isFirstStep = nextIndex === 0;
      const isLastStep = nextIndex === onboardingSteps.length - 1;

      if (onboardingBackBtn) {
        onboardingBackBtn.style.display = isFirstStep ? 'none' : '';
      }

     if (onboardingNextBtn) {
  onboardingNextBtn.textContent = isLastStep
    ? (window.SHIFTFLOW_TRANSLATIONS?.[currentOnboardingLang]?.onboardingStartBtn || 'Start app')
    : '→';
} 
    }

    onboardingLanguageButtons.forEach(button => {
      button.addEventListener('click', () => {
        onboardingLanguageButtons.forEach(item => {
          item.classList.remove('is-selected');
        });

        button.classList.add('is-selected');

        const selectedLang = button.dataset.langOption || 'nl';
        applyOnboardingTranslations(selectedLang);
      });
    });

    if (onboardingNextBtn) {
      onboardingNextBtn.addEventListener('click', () => {
        const activeIndex = getActiveStepIndex();
        if (activeIndex < 0) return;

        const nextIndex = activeIndex + 1;

        if (nextIndex >= onboardingSteps.length) {
          onboardingHost.hidden = true;
          return;
        }

        showStep(nextIndex);
      });
    }

    if (onboardingBackBtn) {
      onboardingBackBtn.addEventListener('click', () => {
        const activeIndex = getActiveStepIndex();
        if (activeIndex <= 0) return;

        showStep(activeIndex - 1);
      });
    }

    applyOnboardingTranslations(currentOnboardingLang);
showStep(0);
  } catch (error) {
    console.error('Failed to load onboarding flow:', error);
  }
}

function showAppToast(message = '') {
  const text = String(message || '').trim();
  if (!text) return;

  const existingToast = document.getElementById('shiftFlowToast');
  if (existingToast) {
    existingToast.remove();
  }

  const toast = document.createElement('div');
  toast.id = 'shiftFlowToast';
  toast.textContent = text;
  toast.style.position = 'fixed';
  toast.style.left = '50%';
  toast.style.bottom = 'calc(22px + env(safe-area-inset-bottom))';
  toast.style.transform = 'translateX(-50%)';
  toast.style.maxWidth = 'calc(100vw - 32px)';
  toast.style.padding = '12px 16px';
  toast.style.border = '1px solid rgba(79, 214, 194, 0.22)';
  toast.style.borderRadius = '14px';
  toast.style.background = 'linear-gradient(180deg, rgba(20, 60, 64, 0.98), rgba(11, 34, 37, 0.98))';
  toast.style.color = '#f4fbfb';
  toast.style.boxShadow = '0 18px 40px rgba(0, 0, 0, 0.34), 0 0 24px rgba(79, 214, 194, 0.12)';
  toast.style.zIndex = '120';
  toast.style.fontSize = '14px';
  toast.style.lineHeight = '1.4';
  toast.style.textAlign = 'center';

  document.body.appendChild(toast);

  window.setTimeout(() => {
    toast.remove();
  }, 2200);
}

    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

    confirmModalHost.hidden = true;
  }

  if (confirmModalTitle) {
    confirmModalTitle.textContent = '';
  }

  if (confirmModalBody) {
    confirmModalBody.textContent = '';
  }
}

function openConfirmModal({ title = '', body = '', onAccept = null } = {}) {
  pendingConfirmAction = typeof onAccept === 'function' ? onAccept : null;

  if (confirmModalTitle) {
    confirmModalTitle.textContent = title || '';
  }

  if (confirmModalBody) {
    confirmModalBody.textContent = body || '';
  }

  if (confirmModalHost) {
    confirmModalHost.hidden = false;
  }
}

if (confirmModalCancelBtn) {
  confirmModalCancelBtn.addEventListener('click', () => {
    closeConfirmModal();
  });
}

if (confirmModalAcceptBtn) {
  confirmModalAcceptBtn.addEventListener('click', async () => {
    const action = pendingConfirmAction;
    closeConfirmModal();

    if (typeof action === 'function') {
      await action();
    }
  });
}

if (confirmModalHost) {
  confirmModalHost.addEventListener('click', (event) => {
    if (event.target === confirmModalHost || event.target.closest('.confirm-modal-backdrop')) {
      const clickedCard = event.target.closest('.confirm-modal-card');
      if (!clickedCard) {
        closeConfirmModal();
      }
    }
  });
}

async function openCustomerOverlayById(customerId = '') {

<script>
  function applyTranslations(lang) {
    const dict = (window.SHIFTFLOW_TRANSLATIONS && window.SHIFTFLOW_TRANSLATIONS[lang])
      || (window.SHIFTFLOW_TRANSLATIONS && window.SHIFTFLOW_TRANSLATIONS.nl)
      || null;

    if (!dict) return;

    document.documentElement.lang = lang;
    document.documentElement.dataset.lang = lang;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (dict[key]) el.textContent = dict[key];
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (dict[key]) el.placeholder = dict[key];
    });
  }

  window.applyShiftFlowTranslations = applyTranslations;
</script>
