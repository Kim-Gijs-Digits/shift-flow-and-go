<style>
  .customer-overlay-backdrop{
    position: absolute;
    inset: 0;
    background: rgba(2, 10, 12, 0.58);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 20px 14px;
  }

  .customer-overlay-card{
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid rgba(79, 214, 194, 0.22);
    border-radius: 24px 24px 20px 20px;
    background: linear-gradient(180deg, rgba(24, 72, 76, 0.98), rgba(11, 34, 37, 0.98));
    color: #f4fbfb;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34), 0 0 24px rgba(79, 214, 194, 0.12);
    padding: 16px;
    animation: customerOverlayIn 180ms ease-out;
  }

  @keyframes customerOverlayIn{
    from{
      opacity: 0;
      transform: translateY(18px);
    }
    to{
      opacity: 1;
      transform: translateY(0);
    }
  }

  .customer-overlay-top{
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 12px;
  }

  .customer-overlay-action{
    min-width: 40px;
    height: 40px;
    padding: 0 12px;
    border: 1px solid rgba(79, 214, 194, 0.22);
    border-radius: 14px;
    background: rgba(79, 214, 194, 0.08);
    color: #eafffb;
    font-size: 15px;
  }

 .customer-overlay-photo{
  height: 180px;
  border: 1px dashed rgba(79, 214, 194, 0.30);
  border-radius: 20px;
  background: rgba(79, 214, 194, 0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0;
  margin-bottom: 12px;
  color: #9fd6cc;
  overflow: hidden;
}
.customer-overlay-photo img{
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
}

  .customer-overlay-name{
    font-size: 22px;
    line-height: 1.2;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .customer-overlay-block{
    margin-top: 14px;
    padding: 14px;
    border: 1px solid rgba(79, 214, 194, 0.16);
    border-radius: 16px;
    background: rgba(79, 214, 194, 0.05);
  }

  .customer-overlay-block-title{
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #9fd6cc;
    margin-bottom: 8px;
  }

  .customer-overlay-line{
    font-size: 15px;
    line-height: 1.45;
    margin-top: 6px;
  }
</style>

<div class="customer-overlay-backdrop">
  <div class="customer-overlay-card">
    <div class="customer-overlay-top">
      <button
        id="editCustomerOverlayBtn"
        class="customer-overlay-action"
        aria-label="Bewerken"
        data-i18n-aria-label="editBtn"
        data-i18n-title="editBtn"
      >✎</button>
      <button
        id="closeCustomerOverlayBtn"
        class="customer-overlay-action"
        aria-label="Sluiten"
        data-i18n-aria-label="closeBtn"
        data-i18n-title="closeBtn"
      >✕</button>
    </div>

  <div class="customer-overlay-photo">📍</div>

<div class="customer-overlay-name" data-customer-field="name">Klantnaam</div>

<div class="customer-overlay-block">
  <div class="customer-overlay-block-title" data-i18n="customerOverlayAddressTitle">Adres</div>
  <div class="customer-overlay-line" data-customer-field="address">—</div>
  <div class="customer-overlay-line" data-customer-field="gateCode">—</div>
</div>

<div class="customer-overlay-block">
  <div class="customer-overlay-block-title" data-i18n="customerOverlayContactTitle">Contact</div>
  <div class="customer-overlay-line" data-customer-field="contact">—</div>
  <div class="customer-overlay-line" data-customer-field="phone">—</div>
  <div class="customer-overlay-line" data-customer-field="website">—</div>
</div>

<div class="customer-overlay-block">
  <div class="customer-overlay-block-title" data-i18n="customerOverlayDeliveryTitle">Levering</div>
  <div class="customer-overlay-line" data-customer-field="driverInstructions">—</div>
  <div class="customer-overlay-line" data-customer-field="dropoffInfo">—</div>
</div>

<div class="customer-overlay-block">
  <div class="customer-overlay-block-title" data-i18n="customerOverlayHoursTitle">Uren en notities</div>
  <div class="customer-overlay-line" data-customer-field="openingHours">—</div>
  <div class="customer-overlay-line" data-customer-field="notes">—</div>
</div>

<div class="customer-overlay-block">
  <div class="customer-overlay-block-title" data-i18n="customerOverlayPhotosTitle">Foto’s</div>
  <div class="customer-overlay-line" data-i18n="customerOverlayDetailPhotosPlaceholder">Detailfoto’s</div>
</div>
  </div>
</div>
