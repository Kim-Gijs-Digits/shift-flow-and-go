<style>
  .customer-input-overlay{
    position: absolute;
    inset: 0;
    background: rgba(2, 10, 12, 0.58);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 14px;
  }

  .customer-input-card{
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid rgba(79, 214, 194, 0.22);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(20, 60, 64, 0.98), rgba(11, 34, 37, 0.98));
    color: #f4fbfb;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34), 0 0 24px rgba(79, 214, 194, 0.12);
    padding: 16px;
  }

  .customer-input-top{
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 10px;
  }

  .customer-input-action{
    min-width: 40px;
    height: 40px;
    padding: 0 12px;
    border: 1px solid rgba(79, 214, 194, 0.22);
    border-radius: 14px;
    background: rgba(79, 214, 194, 0.08);
    color: #eafffb;
    font-size: 15px;
  }

  .customer-input-photo{
  min-height: 160px;
  border: 1px dashed rgba(79, 214, 194, 0.30);
  border-radius: 20px;
  background: rgba(79, 214, 194, 0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  margin-bottom: 12px;
}

#customerMainPhotoPlaceholderWrap{
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.customer-input-photo-actions{
  width: 100%;
  display: flex;
  gap: 10px;
  justify-content: center;
}

.customer-input-photo-actions .customer-input-action{
  flex: 1 1 0;
  max-width: 160px;
}

  .customer-input-field{
    width: 100%;
    min-height: 46px;
    margin-top: 10px;
    padding: 12px 14px;
    border: 1px solid rgba(79, 214, 194, 0.22);
    border-radius: 14px;
    background: rgba(79, 214, 194, 0.08);
    color: #eafffb;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
  }

  .customer-input-field::placeholder,
  .customer-input-textarea::placeholder{
    color: #9fd6cc;
  }

  .customer-input-textarea{
    width: 100%;
    min-height: 88px;
    margin-top: 10px;
    padding: 12px 14px;
    border: 1px solid rgba(79, 214, 194, 0.22);
    border-radius: 14px;
    background: rgba(79, 214, 194, 0.08);
    color: #eafffb;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
    resize: vertical;
  }

  .customer-input-block{
    margin-top: 14px;
  }
</style>

<div class="customer-input-overlay">
  <div class="customer-input-card">
  <div class="customer-input-top">
  <button id="closeCustomerInputBtn" class="customer-input-action" aria-label="Sluiten">✕</button>

  <button
    id="deleteCustomerInputBtn"
    class="customer-input-action"
    type="button"
    aria-label="Verwijderen"
    data-i18n-aria-label="deleteCustomerBtn"
    title="Verwijderen"
    data-i18n-title="deleteCustomerBtn"
    style="border-color: rgba(255, 90, 90, 0.28); background: rgba(255, 90, 90, 0.08); color: #ffe8e8;"
  >🗑</button>

  <button id="saveCustomerInputBtn" class="customer-input-action" data-i18n="saveBtn">Opslaan</button>
</div>

  <div
  class="customer-input-photo"
  id="customerMainPhotoPreview"
>
  <img
    id="customerMainPhotoPreviewImg"
    alt=""
    style="display:none;width:100%;height:100%;object-fit:cover;border-radius:20px;"
  >

  <div id="customerMainPhotoPlaceholderWrap">
    <span
      id="customerMainPhotoPlaceholderText"
      data-i18n="customerPhotoPlaceholder"
    >
      Hoofdlocatiefoto / camera / opslag komt hier
    </span>

    <div class="customer-input-photo-actions">
      <button
        type="button"
        id="openMainPhotoCameraBtn"
        class="customer-input-action"
      >Camera</button>

      <button
        type="button"
        id="openMainPhotoUploadBtn"
        class="customer-input-action"
      >Uploaden</button>
    </div>
  </div>
</div>

<input
  id="customerMainPhotoCameraInput"
  type="file"
  accept="image/*"
  capture="environment"
  hidden
>

<input
  id="customerMainPhotoUploadInput"
  type="file"
  accept="image/*"
  hidden
>
    <input
  id="customerNameInput"
  class="customer-input-field"
  type="text"
  placeholder="Klantnaam"
  data-i18n-placeholder="customerNamePlaceholder"
>

<div class="customer-input-block">
  <input
    id="customerAddressInput"
    class="customer-input-field"
    type="text"
    placeholder="Volledig adres + postcode"
    data-i18n-placeholder="customerAddressPlaceholder"
  >
  <input
    id="customerGateCodeInput"
    class="customer-input-field"
    type="text"
    placeholder="Poortcode"
    data-i18n-placeholder="customerGateCodePlaceholder"
  >
</div>

<div class="customer-input-block">
  <input
    id="customerContactInput"
    class="customer-input-field"
    type="text"
    placeholder="Contactpersoon"
    data-i18n-placeholder="customerContactPlaceholder"
  >
  <input
    id="customerPhoneInput"
    class="customer-input-field"
    type="text"
    placeholder="Telefoonnummer"
    data-i18n-placeholder="customerPhonePlaceholder"
  >
  <input
    id="customerWebsiteInput"
    class="customer-input-field"
    type="text"
    placeholder="Website"
    data-i18n-placeholder="customerWebsitePlaceholder"
  >
</div>

<div class="customer-input-block">
  <textarea
    id="customerDriverInstructionsInput"
    class="customer-input-textarea"
    placeholder="Instructies chauffeur"
    data-i18n-placeholder="customerDriverInstructionsPlaceholder"
  ></textarea>
  <textarea
    id="customerDropoffInput"
    class="customer-input-textarea"
    placeholder="Waar levering achterlaten"
    data-i18n-placeholder="customerDropoffPlaceholder"
  ></textarea>
</div>

<div class="customer-input-block">
  <input
    id="customerOpeningHoursInput"
    class="customer-input-field"
    type="text"
    placeholder="Openingsuren"
    data-i18n-placeholder="customerOpeningHoursPlaceholder"
  >
  <textarea
    id="customerNotesInput"
    class="customer-input-textarea"
    placeholder="Vrije opmerkingen"
    data-i18n-placeholder="customerNotesPlaceholder"
  ></textarea>
</div>

<div class="customer-input-block">
  <div class="customer-input-photo-actions">
    <button
      type="button"
      class="customer-input-action"
      id="openDetailPhotosCameraBtn"
    >Camera</button>

    <button
      type="button"
      class="customer-input-action"
      id="openDetailPhotosUploadBtn"
      data-i18n="addDetailPhotosBtn"
    >Detailfoto’s toevoegen</button>
  </div>

  <input
    id="customerDetailPhotosCameraInput"
    type="file"
    accept="image/*"
    capture="environment"
    multiple
    hidden
  >

  <input
    id="customerDetailPhotosUploadInput"
    type="file"
    accept="image/*"
    multiple
    hidden
  >
</div>
  </div>
</div>
